name: Validate Solution & Auto-Respond

on:
  pull_request:
    paths:
      - 'solutions/**'
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install PyGithub
      
      - name: Get changed files
        id: files
        uses: tj-actions/changed-files@v40
        with:
          files: solutions/**
      
      - name: Validate solution
        id: validate
        env:
          CHANGED_FILES: ${{ steps.files.outputs.all_changed_files }}
        run: |
          # For each changed solution file
          for file in $CHANGED_FILES; do
            echo "Validating: $file"
            
            # Run validator
            python scripts/validator.py "$file" > validation_output.txt
            VALID=$?
            
            # Read output
            FEEDBACK=$(cat validation_output.txt)
            
            # Set outputs
            echo "valid=$VALID" >> $GITHUB_OUTPUT
            echo "feedback<<EOF" >> $GITHUB_OUTPUT
            echo "$FEEDBACK" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            # Store file path
            echo "solution_file=$file" >> $GITHUB_OUTPUT
          done
      
      - name: Extract solver info
        id: solver
        run: |
          # Extract solver name from solution file
          SOLVER=$(grep -oP 'solver:\s*\K.+' ${{ steps.validate.outputs.solution_file }} | tr -d '"' | xargs)
          DAY=$(grep -oP 'day:\s*\K\d+' ${{ steps.validate.outputs.solution_file }})
          
          echo "solver=$SOLVER" >> $GITHUB_OUTPUT
          echo "day=$DAY" >> $GITHUB_OUTPUT
      
      - name: Check if first solve
        id: first_solve
        run: |
          # Check if this is the first solve for this day
          DAY=${{ steps.solver.outputs.day }}
          
          # Count existing solutions for this day
          SOLVE_COUNT=$(find solutions/ -name "day-${DAY}-*.md" | wc -l)
          
          if [ $SOLVE_COUNT -eq 1 ]; then
            echo "is_first=true" >> $GITHUB_OUTPUT
          else
            echo "is_first=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Calculate streak
        id: streak
        run: |
          # Check solver's previous solutions to calculate streak
          SOLVER="${{ steps.solver.outputs.solver }}"
          
          # Count consecutive days (simplified - you can make this more sophisticated)
          STREAK=$(find solutions/ -name "*${SOLVER}*.md" | wc -l)
          
          echo "streak=$STREAK" >> $GITHUB_OUTPUT
      
      - name: Comment on PR - Valid Solution
        if: steps.validate.outputs.valid == '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const solver = '${{ steps.solver.outputs.solver }}';
            const day = '${{ steps.solver.outputs.day }}';
            const isFirst = '${{ steps.first_solve.outputs.is_first }}' === 'true';
            const streak = parseInt('${{ steps.streak.outputs.streak }}');
            
            let message = `🎯 **SIGNAL ACQUIRED**\n\n`;
            message += `The orbital relay has accepted your transmission, ${solver}. Your decryption was flawless.\n\n`;
            message += `> *The network hums with approval. Another node awakens.*\n\n`;
            message += `**Status:** AUTHENTICATED ✅\n`;
            message += `**Day:** ${day}\n`;
            
            if (isFirst) {
              message += `\n🏆 **FIRST SOLVER BONUS**\n\nYou are the FIRST to crack Day ${day}!\n`;
              message += `**Achievement Unlocked:** 🥇 *Pioneer Signal*\n`;
            }
            
            if (streak >= 3) {
              message += `\n🔥 **${streak}-DAY STREAK**\n\nYour consistency impresses the network.\n`;
            }
            
            message += `\n**✅ Ready to merge manually!**`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
      
      - name: Comment on PR - Invalid Solution
        if: steps.validate.outputs.valid != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const solver = '${{ steps.solver.outputs.solver }}';
            const feedback = `${{ steps.validate.outputs.feedback }}`;
            
            let message = `❌ **SIGNAL LOST**\n\n`;
            message += `Your decryption attempt failed, ${solver}. The relay rejects your transmission.\n\n`;
            message += `> *The network remains silent. Your key is incorrect.*\n\n`;
            message += `**Status:** AUTHENTICATION FAILED\n`;
            message += `**Feedback:** ${feedback}\n\n`;
            message += `**Retry:** PERMITTED\n\n`;
            message += `*The satellites watch. They wait for your next attempt.*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
      
      # REMOVED AUTO-MERGE - You must merge manually now!
      # REMOVED AUTO-CLOSE - Invalid PRs stay open for retry
      
      - name: Add labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = [];
            
            if ('${{ steps.validate.outputs.valid }}' === '0') {
              labels.push('✅ valid-solution');
            } else {
              labels.push('❌ invalid-solution');
            }
            
            if ('${{ steps.first_solve.outputs.is_first }}' === 'true') {
              labels.push('🥇 first-solve');
            }
            
            const streak = parseInt('${{ steps.streak.outputs.streak }}');
            if (streak >= 3) labels.push('🔥 streak');
            if (streak >= 7) labels.push('⚡ legendary');
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }